<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lacinhos da Maju</title>

<style>
body {
    margin: 0;
    background: #fce4ec;
    display: flex;
    justify-content: center;
    align-items: center;
}

.container {
    position: relative;
    max-width: 500px;
    width: 100%;
}

.container img {
    width: 100%;
    display: block;
}

/* BOTÃO CLICÁVEL EM CIMA DA IMAGEM */
.botao {
    position: absolute;
    left: 50%;
    transform: translateX(-50%);
    
    /* AJUSTA A ALTURA DO BOTÃO AQUI */
    top: 62%;

    width: 70%;
    height: 60px;

    text-indent: -9999px; /* esconde texto */
}
</style>
</head>

<body>

<div class="container">

    <!-- COLOCA SUA IMAGEM AQUI -->
    <img src="SUA-IMAGEM-AQUI.jpg">

    <!-- ÁREA CLICÁVEL -->
    <a href="https://lacinhosdamaju2.kyte.site" class="botao">
        Entrar no site
    </a>

</div>

</body>
</html>
